name: CI

# Quality gate: every push and PR must pass typecheck, unit tests, and a
# production build before it can be merged / deployed.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Production build
        run: pnpm build
        env:
          # Placeholder values so `next build` can collect page data without a
          # live database. Real secrets are configured on the server, not in CI.
          NODE_ENV: production
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          DATABASE_ALLOW_INSECURE_SSL: 'true'
          BETTER_AUTH_URL: http://localhost:3600
          BETTER_AUTH_SECRET: ci-build-only-secret-000000000000000000
